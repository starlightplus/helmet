<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <!-- 响应式设计meta标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>灵盔佑驰终端</title>
    <!-- 百度地图API（普通版本 v=3.0，用于数字孪生） -->
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=C81uBynkCqbFp9suE5SZF50pEzlsCyNM"></script>
    <!-- 百度地图API（WebGL版本 v=1.0，用于终端） -->
    <script type="text/javascript" src="https://api.map.baidu.com/api?type=webgl&v=1.0&ak=C81uBynkCqbFp9suE5SZF50pEzlsCyNM"></script>
    <!-- 高德地图JS API（请在高德控制台将此key的平台类型设为"Web端(JS API)"以消除USERKEY_PLAT_NOMATCH） -->
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=9f6c5a83a18e12a03b675b63877fb8e2&plugin=AMap.Geocoder,AMap.Riding,AMap.Scale,AMap.ControlBar,AMap.Buildings"></script>
    <!-- AOS动画库CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- 科技风等宽字体（设备状态页等仪表读数用） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <!-- AOS动画库JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
