server.port=8082
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Jackson 配置
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds=false
spring.jackson.modules=com.fasterxml.jackson.datatype.jsr310.JavaTimeModule

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/intelligent_helmet?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# JWT 配置
jwt.secret=intelligent-helmet-jwt-secret-key-2025-must-be-at-least-32-chars
jwt.expiration=86400000

# 日志配置
logging.level.com.demo=INFO
logging.level.org.springframework=WARN
logging.level.org.apache.qpid=INFO
logging.level.org.springframework.security=WARN

# AI 对话配置（DeepSeek API）
claude.api.key=sk-8d29c951c7e041208ce8437794439818
claude.api.url=https://api.deepseek.com/chat/completions
claude.api.model=deepseek-chat
