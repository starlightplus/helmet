server.port=8082
# 设置编码
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Jackson 配置 - 支持 Java 8 时间类型
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds=false
# 显式启用 JavaTimeModule
spring.jackson.modules=com.fasterxml.jackson.datatype.jsr310.JavaTimeModule

# H2数据库配置
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2数据库控制台
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA配置
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# MySQL数据库配置（如需使用MySQL，请取消注释以下配置并注释H2配置）
# spring.datasource.url=jdbc:mysql://localhost:3306/intelligent_helmet?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
